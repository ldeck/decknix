name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'modules/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Generate options reference
        run: |
          OPTIONS_MD=$(nix-build docs/generate-options.nix -A markdown --no-out-link)
          # Inject generated markdown between the markers in options.md
          {
            sed -n '1,/<!-- OPTIONS_START -->/p' docs/src/options.md
            cat "$OPTIONS_MD"
            sed -n '/<!-- OPTIONS_END -->/,$p' docs/src/options.md
          } > docs/src/options.md.tmp
          mv docs/src/options.md.tmp docs/src/options.md

      - name: Install mdBook
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build documentation
        run: mdbook build docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

