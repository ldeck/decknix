name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'modules/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Generate options JSON (per nixpkgs channel)
        run: |
          mkdir -p docs/src/data
          for channel in nixos-24.11 nixos-unstable; do
            echo "::group::Generating options for $channel"
            OPTIONS_JSON=$(NIX_PATH="nixpkgs=channel:$channel" nix-build docs/generate-options.nix -A json --no-out-link)
            # Copy JSON and normalise declaration paths to relative
            python3 -c "
          import json, sys, os
          with open(os.path.join('$OPTIONS_JSON', 'share/doc/nixos/options.json')) as f:
              data = json.load(f)
          # Strip absolute paths to relative (modules/...)
          for opt in data.values():
              opt['declarations'] = [
                  d.split('/modules/', 1)[-1] if '/modules/' in d else d.rsplit('/', 1)[-1]
                  for d in opt.get('declarations', [])
              ]
          slug = '$channel'.replace('nixos-', '')
          with open(f'docs/src/data/options-{slug}.json', 'w') as f:
              json.dump(data, f, separators=(',', ':'))
          print(f'  wrote options-{slug}.json ({len(data)} options)')
          "
            echo "::endgroup::"
          done
          ls -la docs/src/data/

      - name: Install mdBook
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build documentation
        run: mdbook build docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

